---
layout: default
---

<header>
  <h1>{{ page.title }}</h1>
  <p>
    <a href="https://github.com/thomshutt">by {{ site.author }}</a>
    {% if page.date %}<span aria-hidden="true">·</span> <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y" }}</time>{% endif %}
  </p>
</header>

<main>
  {{ content }}
</main>
