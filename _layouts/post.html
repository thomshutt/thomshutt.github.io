---
layout: default
---

{% assign header_image = page.header_image | default: page.header_img %}
<header {% if header_image %}style="background-image: url('{{ header_image }}')"{% endif %}>
  <h1>{{ page.title }}</h1>
  <a href="/">by {{ site.author }}</a>
</header>

<main>
  {{ content }}
</main>
